# =============================================================================
# IMPLEMENTATION NOTES FOR THE OPERATOR (what the agent building this needs)
# =============================================================================
#
# LANGUAGE: Go. Use kubebuilder v4 to scaffold.
#   kubebuilder init --domain clawbernetes.io --repo github.com/clawbernetes/operator
#   kubebuilder create api --group claw --version v1 --kind ClawAgent
#   kubebuilder create api --group claw --version v1 --kind ClawGateway
#   kubebuilder create api --group claw --version v1 --kind ClawPolicy
#   kubebuilder create api --group claw --version v1 --kind ClawSkillSet
#   kubebuilder create api --group claw --version v1 --kind ClawConnector
#   kubebuilder create api --group claw --version v1 --kind ClawObservability
#
# CONTAINER IMAGE: The orq.ai fork ships a Dockerfile already.
#   git clone --recurse-submodules https://github.com/orq-ai/openclaw.git
#   docker build -t clawbernetes/openclaw:latest .
#   The operator uses this image for every ClawAgent pod it creates.
#   No custom image needed — just the upstream fork image.
#
# WORKSPACE SEEDING: The operator runs an init container before OpenClaw starts.
#   Init container writes SOUL.md, IDENTITY.md, USER.md from ClawAgent spec
#   into a shared emptyDir volume at /root/.openclaw/workspace/.
#   Main container (OpenClaw) starts after init completes — reads files as normal.
#   OpenClaw's ensureAgentWorkspace() uses writeFileIfMissing (wx flag) so it
#   won't overwrite what the init container already placed.
#
# SKILL MOUNTING: ClawSkillSet contents become a ConfigMap.
#   Each skill entry becomes one key in the ConfigMap (key = skill name + /SKILL.md).
#   Mounted as a volume into the agent pod at:
#   /root/.openclaw/workspace/skills/<skill-name>/SKILL.md
#   OpenClaw's loadWorkspaceSkillEntries() scans this directory at startup.
#
# POLICY INJECTION: ClawPolicy becomes an observeclaw plugin ConfigMap.
#   The operator renders the observeclaw YAML from the ClawPolicy spec
#   and mounts it at /root/.openclaw/plugins/observeclaw/config.yaml.
#   The gateway picks it up on start via openclaw plugins enable observeclaw.
#
# OBSERVABILITY: ClawObservability controller deploys Tempo + Grafana.
#   Use official Grafana/Tempo container images — no custom builds.
#   Tempo: grafana/tempo:latest, port 4318 (OTLP HTTP)
#   Grafana: grafana/grafana:latest, port 3000
#   Pre-built dashboard JSONs embedded in the operator binary as go:embed.
#   The operator creates a ConfigMap for each dashboard and mounts into Grafana
#   at /etc/grafana/provisioning/dashboards/ — Grafana auto-imports them.
#   Datasource (Tempo) provisioned via /etc/grafana/provisioning/datasources/.
#
# OTEL INJECTION INTO OPENCLAW: The operator sets environment variables on
#   the ClawAgent pod that the diagnostics-otel plugin reads:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo.clawbernetes.svc.cluster.local:4318
#   OTEL_EXPORTER_OTLP_HEADERS=""  (empty — no auth needed for in-cluster Tempo)
#   OTEL_SERVICE_NAME=<agent metadata.name>
#   Plus in openclaw.json ConfigMap: diagnostics.enabled=true, otel.enabled=true.
#
# KIND CLUSTER SETUP for demo:
#   kind create cluster --name clawbernetes
#   kubectl create namespace clawbernetes
#   make deploy  (kubebuilder generates this — deploys operator into cluster)
#   kubectl apply -f clawbernetes-vision.yaml
#   kubectl port-forward svc/grafana 3000:3000 -n clawbernetes &
#
# MINIMUM VIABLE DEMO SCOPE (8 hours, solo):
#   Priority 1 — ClawObservability controller (Tempo + Grafana up and running)
#   Priority 2 — ClawAgent controller (pod creation + init container seeding)
#   Priority 3 — ClawSkillSet (ConfigMap → volume mount)
#   Priority 4 — ClawPolicy (observeclaw config injection)
#   Cut if needed — ClawConnector, ClawGateway (mention in pitch, skip impl)
#   The demo works with Priority 1+2 alone. Skills make it better. Gateway is future.
#
# =============================================================================