---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - claw.clawbernetes.io
  resources:
  - clawagents
  - clawobservabilities
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - claw.clawbernetes.io
  resources:
  - clawagents/finalizers
  - clawobservabilities/finalizers
  verbs:
  - update
- apiGroups:
  - claw.clawbernetes.io
  resources:
  - clawagents/status
  - clawobservabilities/status
  verbs:
  - get
  - patch
  - update
