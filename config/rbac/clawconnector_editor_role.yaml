# This rule is not used by the project hackaway-repo itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the claw.clawbernetes.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hackaway-repo
    app.kubernetes.io/managed-by: kustomize
  name: clawconnector-editor-role
rules:
- apiGroups:
  - claw.clawbernetes.io
  resources:
  - clawconnectors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - claw.clawbernetes.io
  resources:
  - clawconnectors/status
  verbs:
  - get
