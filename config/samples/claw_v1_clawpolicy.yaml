apiVersion: claw.clawbernetes.io/v1
kind: ClawPolicy
metadata:
  name: engineering-policy
  namespace: clawbernetes
  labels:
    team: engineering
spec:
  toolPolicy:
    deny:
      - rm_rf
      - drop_database
      - kubectl_delete_namespace
  budget:
    daily: 10
    monthly: 200
    warnAt: "0.9"
    downgradeModel: claude-haiku-4-5
    downgradeProvider: anthropic
