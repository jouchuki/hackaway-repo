apiVersion: claw.clawbernetes.io/v1
kind: ClawConnector
metadata:
  name: production-postgres
  namespace: clawbernetes
  labels:
    team: engineering
spec:
  type: database
  driver: postgresql
  host: postgres.databases.svc.cluster.local
  port: 5432
  database: production
  credentialsSecret: postgres-credentials
  permissions:
    - SELECT
    - EXPLAIN
  rateLimit:
    requestsPerMinute: 30
