apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-proxy-config
  namespace: clawbernetes
  labels:
    app: agent-proxy
    app.kubernetes.io/managed-by: clawbernetes
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 128; }
    http {
      resolver kube-dns.kube-system.svc.cluster.local valid=5s;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      # Dynamic agent routing: <agent-name>.local → agent service on port 18789
      server {
        listen 80;
        server_name ~^(?<agent_name>.+)\.local$;
        location / {
          set $upstream_agent http://${agent_name}.clawbernetes.svc.cluster.local:18789;
          proxy_pass $upstream_agent;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_read_timeout 300s;
        }
      }

      server {
        listen 80;
        server_name grafana.local;
        location / {
          set $upstream_grafana http://grafana.clawbernetes.svc.cluster.local:3000;
          proxy_pass $upstream_grafana;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_read_timeout 300s;
        }
      }

      server {
        listen 80 default_server;
        location / {
          root /usr/share/nginx/fleet-dashboard;
          index index.html;
          try_files $uri $uri/ /index.html;
        }
      }
    }
