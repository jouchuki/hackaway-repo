spec:
  group: claw.clawbernetes.io
  names:
    kind: ClawGateway
    listKind: ClawGatewayList
    plural: clawgateways
    singular: clawgateway
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: ClawGateway is the Schema for the clawgateways API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClawGateway
            properties:
              anomaly:
                description: anomaly defines anomaly detection thresholds.
                properties:
                  checkIntervalSeconds:
                    description: checkIntervalSeconds is how often anomaly detectors
                      run.
                    type: integer
                  errorLoopThreshold:
                    description: errorLoopThreshold auto-pauses the agent after this
                      many consecutive errors.
                    type: integer
                  idleBurnMinutes:
                    description: idleBurnMinutes triggers an alert after this many
                      minutes of continuous LLM calls with no useful output.
                    type: integer
                  spendSpikeMultiplier:
                    description: spendSpikeMultiplier triggers an alert when hourly
                      spend exceeds this multiple of the 7-day average.
                    type: integer
                  tokenInflationMultiplier:
                    description: tokenInflationMultiplier alerts when average input
                      tokens exceed this multiple.
                    type: integer
                type: object
              port:
                description: port is the port the gateway listens on.
                type: integer
              routing:
                description: routing defines the model routing pipeline.
                properties:
                  enabled:
                    description: enabled controls whether routing is active.
                    type: boolean
                  evaluators:
                    description: evaluators is the ordered list of routing evaluators.
                    items:
                      description: GatewayEvaluatorSpec defines a single routing evaluator.
                      properties:
                        action:
                          description: action is what to do on match (block, proxy,
                            route).
                          type: string
                        blockReply:
                          description: blockReply is the message returned when action
                            is block.
                          type: string
                        classifierEndpoint:
                          description: classifierEndpoint is the endpoint for the
                            classifier model.
                          type: string
                        classifierModel:
                          description: classifierModel is the model used for classifier-type
                            evaluators.
                          type: string
                        emitEvent:
                          description: emitEvent controls whether a Kubernetes event
                            is fired.
                          type: boolean
                        name:
                          description: name is the evaluator name.
                          type: string
                        ollamaEndpoint:
                          description: ollamaEndpoint is the Ollama endpoint for local
                            classifier models.
                          type: string
                        patterns:
                          description: patterns is a list of regex patterns for regex-type
                            evaluators.
                          items:
                            type: string
                          type: array
                        priority:
                          description: priority determines evaluation order (highest
                            first).
                          type: integer
                        proxyUrl:
                          description: proxyUrl is the proxy endpoint for proxy-type
                            actions.
                          type: string
                        redactReplacement:
                          description: redactReplacement is the replacement text for
                            redacted content.
                          type: string
                        routes:
                          additionalProperties:
                            description: EvaluatorRouteSpec defines a model route
                              for a complexity class.
                            properties:
                              model:
                                description: model is the model name.
                                type: string
                              provider:
                                description: provider is the model provider.
                                type: string
                            type: object
                          description: routes maps complexity classes to model routes.
                          type: object
                        timeoutMs:
                          description: timeoutMs is the timeout in milliseconds for
                            the evaluator.
                          type: integer
                        type:
                          description: type is the evaluator type (regex, classifier).
                          type: string
                        webhooks:
                          description: webhooks are webhook targets for this evaluator.
                          items:
                            description: GatewayWebhookSpec defines a webhook target
                              for alerts.
                            properties:
                              headers:
                                additionalProperties:
                                  type: string
                                description: headers are additional HTTP headers to
                                  send.
                                type: object
                              minSeverity:
                                description: minSeverity is the minimum severity to
                                  trigger the webhook.
                                type: string
                              url:
                                description: url is the webhook endpoint.
                                type: string
                            type: object
                          type: array
                      type: object
                    type: array
                  logEveryDecision:
                    description: logEveryDecision controls whether every routing decision
                      is logged.
                    type: boolean
                type: object
              topology:
                description: topology is the gateway deployment model ("centralized"
                  or "sidecar").
                enum:
                - centralized
                - sidecar
                type: string
              webhooks:
                description: webhooks defines alerting webhook targets.
                items:
                  description: GatewayWebhookSpec defines a webhook target for alerts.
                  properties:
                    headers:
                      additionalProperties:
                        type: string
                      description: headers are additional HTTP headers to send.
                      type: object
                    minSeverity:
                      description: minSeverity is the minimum severity to trigger
                        the webhook.
                      type: string
                    url:
                      description: url is the webhook endpoint.
                      type: string
                  type: object
                type: array
            type: object
          status:
            description: status defines the observed state of ClawGateway
            properties:
              conditions:
                description: conditions represent the current state of the ClawGateway
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
