---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clawagents.claw.clawbernetes.io
spec:
  group: claw.clawbernetes.io
  names:
    kind: ClawAgent
    listKind: ClawAgentList
    plural: clawagents
    singular: clawagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.podName
      name: Pod
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          ClawAgent is the Schema for the clawagents API.
          It declares a single autonomous OpenClaw agent as a first-class Kubernetes resource.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClawAgent
            properties:
              a2a:
                description: |-
                  a2a controls agent-to-agent communication via the A2A v0.3.0 protocol.
                  When enabled, the openclaw-a2a-gateway plugin is configured with an Agent Card,
                  and the agent can discover and communicate with peers.
                properties:
                  agentCardDescription:
                    description: agentCardDescription is the human-readable description
                      in the Agent Card.
                    type: string
                  agentCardName:
                    description: |-
                      agentCardName is the display name in the A2A Agent Card.
                      Defaults to the agent's metadata.name.
                    type: string
                  enabled:
                    description: enabled controls whether the A2A gateway plugin is
                      active for this agent.
                    type: boolean
                  peers:
                    description: peers lists other A2A agents this agent can communicate
                      with.
                    items:
                      description: A2APeer defines a remote A2A agent peer.
                      properties:
                        agentCardUrl:
                          description: |-
                            agentCardURL is the URL to the peer's Agent Card.
                            For in-cluster peers: http://<agent-name>.<namespace>.svc.cluster.local:18800/.well-known/agent-card.json
                          type: string
                        credentialsSecret:
                          description: |-
                            credentialsSecret is a K8s Secret name containing the peer's auth token.
                            The Secret must have a key named A2A_TOKEN.
                          type: string
                        name:
                          description: name is the peer display name.
                          type: string
                      required:
                      - agentCardUrl
                      - name
                      type: object
                    type: array
                  port:
                    default: 18800
                    description: port is the A2A server port inside the pod. Default
                      18800.
                    type: integer
                  securityTokenSecret:
                    description: |-
                      securityTokenSecret is a K8s Secret name containing the inbound auth token.
                      The Secret must have a key named A2A_TOKEN.
                    type: string
                  skills:
                    description: skills lists the A2A skill IDs this agent advertises
                      in its Agent Card.
                    items:
                      type: string
                    type: array
                type: object
              channels:
                description: |-
                  channels is a list of ClawChannel resource names for delivery integrations
                  (e.g. Telegram, Slack). The operator resolves each channel and generates
                  the corresponding openclaw.json channels config with ${ENV_VAR} credential placeholders.
                items:
                  type: string
                type: array
              credentialsSecret:
                description: |-
                  credentialsSecret names a Kubernetes Secret containing integration credentials
                  (e.g. telegram tokens). Mounted read-only at the harness credentials directory.
                type: string
              gateway:
                description: gateway references the ClawGateway resource name for
                  LLM routing.
                type: string
              harness:
                description: harness selects the agent harness runtime (openclaw,
                  observeclaw, hermes).
                properties:
                  image:
                    description: image overrides the default container image for this
                      harness.
                    type: string
                  type:
                    default: openclaw
                    description: 'type selects the harness runtime. Default: "openclaw".'
                    enum:
                    - openclaw
                    - observeclaw
                    - hermes
                    type: string
                type: object
              identity:
                description: identity defines the agent's soul, user context, and
                  self-concept.
                properties:
                  agentIdentity:
                    description: agentIdentity is the agent's persistent self-concept
                      (maps to IDENTITY.md).
                    type: string
                  soul:
                    description: soul is the agent's core personality and behavior
                      (maps to SOUL.md).
                    type: string
                  user:
                    description: user describes the human operator the agent works
                      with (maps to USER.md).
                    type: string
                type: object
              lifecycle:
                description: lifecycle defines lifecycle management for the agent.
                properties:
                  hibernateAfterIdleMinutes:
                    description: hibernateAfterIdleMinutes scales the agent to zero
                      after this many minutes idle.
                    type: integer
                  maxRuntime:
                    description: maxRuntime is the hard cap on agent runtime (e.g.
                      "24h").
                    type: string
                  restartPolicy:
                    description: restartPolicy controls pod restart behavior.
                    enum:
                    - Always
                    - OnFailure
                    - Never
                    type: string
                type: object
              model:
                description: model defines the default LLM model for this agent.
                properties:
                  fallback:
                    description: fallback defines the fallback model if the primary
                      is unavailable.
                    properties:
                      name:
                        description: name is the model name (e.g. "claude-haiku-4-5").
                        type: string
                      provider:
                        description: provider is the model provider (e.g. "anthropic").
                        type: string
                    type: object
                  name:
                    description: name is the model name (e.g. "claude-sonnet-4-6").
                    type: string
                  provider:
                    description: provider is the model provider (e.g. "anthropic").
                    type: string
                type: object
              observability:
                description: observability references the ClawObservability resource
                  name.
                type: string
              policy:
                description: policy references a ClawPolicy resource by name.
                type: string
              resources:
                description: resources defines Kubernetes resource requests and limits
                  for the agent pod.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: limits describes the maximum resources allowed.
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: requests describes the minimum resources required.
                    type: object
                type: object
              skillSet:
                description: skillSet references a ClawSkillSet resource by name.
                type: string
              telemetryCapture:
                description: telemetryCapture controls what content is captured in
                  OTEL spans.
                properties:
                  inputMessages:
                    description: inputMessages controls whether LLM input messages
                      appear in spans.
                    type: boolean
                  outputMessages:
                    description: outputMessages controls whether LLM output messages
                      appear in spans.
                    type: boolean
                  sampleRate:
                    description: sampleRate is the trace sampling rate (0.0 to 1.0),
                      serialized as string.
                    type: string
                  systemInstructions:
                    description: systemInstructions controls whether system instructions
                      appear in spans.
                    type: boolean
                  toolContent:
                    description: toolContent controls whether tool call content appears
                      in spans.
                    type: boolean
                  toolDefinitions:
                    description: toolDefinitions controls whether tool schemas appear
                      in spans.
                    type: boolean
                type: object
              workspace:
                description: workspace controls storage for the agent home directory.
                properties:
                  mode:
                    default: ephemeral
                    description: mode selects ephemeral (emptyDir) or persistent (PVC)
                      storage.
                    enum:
                    - ephemeral
                    - persistent
                    type: string
                  reclaimPolicy:
                    default: retain
                    description: |-
                      reclaimPolicy controls whether the PVC is deleted or retained when the
                      ClawAgent CR is removed. Only meaningful when mode=persistent.
                      "retain" (default for persistent): PVC survives agent deletion, allowing
                      state recovery by recreating the agent with the same name.
                      "delete": PVC is garbage-collected with the agent CR.
                    enum:
                    - retain
                    - delete
                    type: string
                  storageClassName:
                    description: storageClassName overrides the default StorageClass
                      for the PVC.
                    type: string
                  storageSize:
                    description: |-
                      storageSize is the PVC size when mode=persistent (e.g. "10Gi").
                      Ignored when mode=ephemeral.
                    type: string
                type: object
            type: object
          status:
            description: status defines the observed state of ClawAgent
            properties:
              conditions:
                description: conditions represent the current state of the ClawAgent
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: phase is the current lifecycle phase of the agent (e.g.
                  Running, Hibernating, Error).
                type: string
              podName:
                description: podName is the name of the Pod running this agent.
                type: string
              workspacePVC:
                description: workspacePVC is the name of the PVC backing the agent's
                  home directory (if persistent).
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
